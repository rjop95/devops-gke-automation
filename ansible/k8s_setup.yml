---
- name: Configuración de Servicios en GKE
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    # Definimos dónde guardar Helm temporalmente
    helm_bin_path: "{{ playbook_dir }}/helm"
    helm_version: "v3.12.0"

  tasks:
    - name: 1. Crear namespace de producción
      kubernetes.core.k8s:
        name: production
        api_version: v1
        kind: Namespace
        state: present

    - name: 2. Descargar instalador de Helm
      get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: "/tmp/helm.tar.gz"
        mode: '0644'

    - name: 3. Descomprimir binario de Helm
      unarchive:
        src: "/tmp/helm.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: 4. Mover Helm al directorio del proyecto (sin sudo)
      copy:
        src: "/tmp/linux-amd64/helm"
        dest: "{{ helm_bin_path }}"
        mode: '0755'

    - name: 5. Agregar repositorio de Ingress-Nginx usando el binario local
      shell: "{{ helm_bin_path }} repo add ingress-nginx https://kubernetes.github.io/ingress-nginx && {{ helm_bin_path }} repo update"

    - name: 6. Instalar Ingress Controller
      shell: |
        {{ helm_bin_path }} upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace production \
          --set controller.service.type=LoadBalancer
